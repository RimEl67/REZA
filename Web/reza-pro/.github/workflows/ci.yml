name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci --legacy-peer-deps --no-fund --no-audit
    
    - name: Run linter
      run: |
        npm run lint || true
    
    - name: Build application
      run: |
        NEXT_PRIVATE_SKIP_TURBO=1 npm run build
      env:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.reza.ma/api' }}
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'https://api.reza.ma' }}
        REACT_APP_ENV: production
    
    - name: Check build artifacts
      run: |
        if [ ! -d ".next" ]; then
          echo "Build failed: .next directory not found"
          exit 1
        fi
        echo "Build successful!"
